version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: giftledger-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: giftledger
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: